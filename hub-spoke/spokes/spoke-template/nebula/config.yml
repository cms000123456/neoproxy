# SPOKE NEBULA CONFIGURATION
# This file will be generated by setup-hub.sh
# Copy the generated version from your hub's spokes/ directory

pki:
  ca: /config/ca.crt
  cert: /config/spoke1.crt      # Generated cert
  key: /config/spoke1.key       # Generated key

static_host_map:
  "10.8.0.1": ["HUB_PUBLIC_IP:4242"]

lighthouse:
  hosts:
    - "10.8.0.1"
  interval: 60

listen:
  host: 0.0.0.0
  port: 0  # Random port

punchy:
  punch: true
  respond: true

relay:
  am_relay: false
  use_relays: true
  relays:
    - 10.8.0.1

tun:
  disabled: false
  dev: nebula1
  drop_local_broadcast: false
  drop_multicast: false
  tx_queue: 500
  mtu: 1300

logging:
  level: info
  format: text

firewall:
  outbound:
    - port: any
      proto: any
      host: any
  inbound:
    - port: any
      proto: any
      host: any
      # Only allow traffic from hub/network
      # groups:
      #   - hub
      #   - spoke
