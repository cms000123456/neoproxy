# Keepalived Configuration - MASTER Controller
# Copy this to keepalived.conf on the primary controller

global_defs {
    router_id NPM_HA_MASTER
    script_user root
    enable_script_security
    
    # Email notification (optional)
    # notification_email {
    #     admin@yourdomain.com
    # }
    # notification_email_from keepalived@yourdomain.com
    # smtp_server 127.0.0.1
    # smtp_connect_timeout 30
}

# Script to check if NPM is healthy
vrrp_script check_npm {
    script "/usr/bin/docker ps --filter name=npm --filter health=healthy | grep -q healthy"
    interval 2
    weight -20      # Reduce priority by 20 if check fails
    fall 3          # Require 3 failures
    rise 2          # Require 2 successes to recover
}

# Script to check if shared storage is available
vrrp_script check_storage {
    script "test -f /mnt/neoproxy-data/npm/database.sqlite || test -f /data/npm/database.sqlite"
    interval 5
    weight -10
    fall 2
    rise 2
}

vrrp_instance VI_NPM {
    state MASTER
    interface eth0              # CHANGE THIS to your network interface
    virtual_router_id 51        # Must be same on all controllers
    priority 100                # Highest priority = MASTER
    advert_int 1                # VRRP advertisement interval (seconds)
    
    authentication {
        auth_type PASS
        auth_pass NeoProxy123   # CHANGE THIS - must be same on all controllers
    }
    
    virtual_ipaddress {
        203.0.113.10/24         # CHANGE THIS - your floating/virtual IP
        # Add more IPs if needed:
        # 203.0.113.11/24
    }
    
    # Track scripts - if they fail, priority is reduced
    track_script {
        check_npm
        check_storage
    }
    
    # Notification scripts
    notify_master "/usr/local/bin/notify.sh master"
    notify_backup "/usr/local/bin/notify.sh backup"
    notify_fault "/usr/local/bin/notify.sh fault"
    notify_stop "/usr/local/bin/notify.sh stop"
    
    # SMTP alerts (optional)
    # smtp_alert
}

