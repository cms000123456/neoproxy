version: "3.8"

# Homer - Static dashboard for all your services
# https://github.com/bastienwirtz/homer

services:
  homer:
    image: b4bz/homer:latest
    container_name: homer
    restart: unless-stopped
    ports:
      - "8080:8080"  # Change if needed, or use NPM proxy
    volumes:
      - ./assets:/www/assets
    networks:
      - proxy-network
    environment:
      - INIT_ASSETS=0  # Don't overwrite our custom config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy-network:
    name: proxy-network
    external: true
